<ActionBar class="action-bar">
  <NavigationButton visibility="hidden"></NavigationButton>
  <GridLayout columns="50, *">
    <Label class="action-bar-title" text="PetMatch" colSpan="2"></Label>
    <Label class="fas" text="&#xf0c9;" (tap)="onDrawerButtonTap()"></Label>
  </GridLayout>
</ActionBar>

<StackLayout class="page__content">
  <ns-page-title [title]="'Bienvenido, ' + username"></ns-page-title>

  <StackLayout class="home-section">
    <Label text="📚 Para Leer Después" class="section-title"></Label>
    <ListView [items]="readLaterItems$ | async" class="read-later-list">
      <ng-template nsTemplateKey="default" let-item="item">
        <StackLayout class="read-item-card">
          <GridLayout columns="auto, *" columnSpacing="12">
            <Image col="0" [src]="item.image" class="read-item-image"></Image>
            <StackLayout col="1" class="read-item-info">
              <Label [text]="item.name" class="read-item-name"></Label>
              <Label [text]="item.breed" class="read-item-breed"></Label>
              <Label [text]="item.age" class="read-item-age"></Label>
            </StackLayout>
          </GridLayout>
        </StackLayout>
      </ng-template>
    </ListView>

    <Label
      *ngIf="(readLaterItems$ | async)?.length === 0"
      text="No tienes artículos guardados para leer. ¡Agrega algunos desde Favoritos!"
      class="empty-message"
      textWrap="true"
    ></Label>
  </StackLayout>
</StackLayout>
